name: DOSEA Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android-debug-apk.yml'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - 'vite.config.ts'
      - 'index.html'

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx3g -Dorg.gradle.daemon=false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Generate and sync Android project
        run: |
          npx cap add android || true
          npx cap sync android
          test -f android/gradlew
          test -f android/app/build.gradle

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --stacktrace --info --no-daemon

      - name: Rename APK
        run: |
          mkdir -p apk-output
          cp android/app/build/outputs/apk/debug/app-debug.apk apk-output/DOSEA-debug.apk
          ls -lh apk-output/DOSEA-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOSEA-debug-apk
          path: apk-output/DOSEA-debug.apk
          retention-days: 14

      - name: Upload Android build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: DOSEA-android-build-debug-logs
          path: |
            android/**/build/reports/**
            android/**/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 7
